name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.10.0 --activate
          pnpm -v
          node -v

      - name: Configure GitHub Packages auth
        run: |
          echo "@omrecords82:registry=https://npm.pkg.github.com" >> "$HOME/.npmrc"
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> "$HOME/.npmrc"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Install
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Prohibited dependency check
        run: pnpm validate:deps

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          VITE_PORTAL_BASE_PATH: /portal2
